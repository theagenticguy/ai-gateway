# mise.toml -- AI Gateway project configuration
# Manages all tool versions, env vars, and project tasks

[tools]
python = "3.13"
"pipx:checkov" = "3.2.513"

# Security tools via aqua backend
"aqua:aquasecurity/trivy" = "0.69.2"
"aqua:anchore/grype" = "0.90.0"
"aqua:google/osv-scanner" = "2.0.1"
"aqua:hadolint/hadolint" = "2.14.0"
"aqua:evilmartians/lefthook" = "2.1.4"
"aqua:zricethezav/gitleaks" = "8.30.1"
"aqua:rhysd/actionlint" = "1.7.11"

# IaC
"aqua:hashicorp/terraform" = "1.14.8"
"aqua:gruntwork-io/terragrunt" = "0.99.5"
"aqua:terraform-docs/terraform-docs" = "0.21.0"

[env]
_.python.venv = { path = ".venv", create = true }
PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"

# ──────────────────────────────────────────────
# Core tasks
# ──────────────────────────────────────────────

[tasks.install]
description = "Install all project dependencies and git hooks"
run = ["uv sync", "lefthook install"]

[tasks.dev]
description = "Run the API gateway in development mode"
run = "uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"

[tasks.test]
description = "Run test suite"
run = "uv run pytest tests/ -v"
sources = ["src/**/*.py", "tests/**/*.py"]

[tasks.lint]
description = "Run linter and formatter check"
run = ["uv run ruff check .", "uv run ruff format --check ."]

[tasks.format]
description = "Auto-format all code"
run = ["uv run ruff format .", "uv run ruff check --fix .", "terraform -chdir=infrastructure fmt -recursive"]

[tasks.typecheck]
description = "Run type checker"
run = "uv run pyright src/"

# ──────────────────────────────────────────────
# Security tasks
# ──────────────────────────────────────────────

[tasks.security]
description = "Run all security scans"
depends = ["security:sast", "security:secrets", "security:iac", "security:dockerfile", "security:fs", "security:deps", "security:osv"]

[tasks."security:sast"]
description = "SAST scan with semgrep"
run = "uvx semgrep scan --config auto --config p/python --config p/owasp-top-ten --config p/security-audit --exclude 'infrastructure/' ."

[tasks."security:secrets"]
description = "Secret detection with gitleaks"
run = "gitleaks detect --source . --verbose"

[tasks."security:iac"]
description = "IaC security scan with checkov"
run = "uvx checkov -d infrastructure/ --framework terraform --compact"

[tasks."security:dockerfile"]
description = "Lint Dockerfiles with hadolint"
run = "hadolint Dockerfile"

[tasks."security:image"]
description = "Scan container image with trivy"
run = "trivy image --severity HIGH,CRITICAL --exit-code 1 ai-gateway:latest"

[tasks."security:fs"]
description = "Filesystem vulnerability scan with trivy"
run = "trivy fs --severity HIGH,CRITICAL --exit-code 1 ."

[tasks."security:deps"]
description = "Audit Python dependencies for known vulnerabilities"
run = "uv export --no-dev --no-hashes > /tmp/requirements.txt && uvx pip-audit -r /tmp/requirements.txt --strict --desc"

[tasks."security:sbom-rescan"]
description = "Rescan latest SBOM with Grype (catches newly disclosed CVEs)"
run = "grype sbom.cyclonedx.json --fail-on high"

[tasks."security:osv"]
description = "Scan lockfiles against OSV vulnerability database"
run = "osv-scanner scan --lockfile uv.lock --lockfile docs/pnpm-lock.yaml"

# ──────────────────────────────────────────────
# Terraform tasks
# ──────────────────────────────────────────────

[tasks."tf:init"]
description = "Initialize Terraform"
run = "terraform -chdir=infrastructure init"

[tasks."tf:plan"]
description = "Terraform plan (dry-run)"
run = "terraform -chdir=infrastructure plan"
depends = ["tf:init"]

[tasks."tf:fmt"]
description = "Format Terraform files"
run = "terraform -chdir=infrastructure fmt -recursive"

[tasks."tf:validate"]
description = "Validate Terraform configuration"
run = "terraform -chdir=infrastructure validate"
depends = ["tf:init"]

[tasks."tf:docs"]
description = "Generate Terraform documentation"
run = "terraform-docs markdown table --output-file README.md --output-mode inject infrastructure/"

# ──────────────────────────────────────────────
# Terragrunt tasks
# ──────────────────────────────────────────────

[tasks."tg:init"]
description = "Terragrunt init for a specific environment"
run = "terragrunt init"

[tasks."tg:plan"]
description = "Terragrunt plan for a specific environment"
run = "terragrunt plan"

[tasks."tg:plan-all"]
description = "Terragrunt plan all environments"
run = "terragrunt run-all plan --terragrunt-non-interactive"
dir = "terragrunt"

[tasks."tg:validate-all"]
description = "Terragrunt validate all environments"
run = "terragrunt run-all validate --terragrunt-non-interactive"
dir = "terragrunt"

# ──────────────────────────────────────────────
# CI tasks
# ──────────────────────────────────────────────

[tasks.ci]
description = "Full CI pipeline (lint, typecheck, test, security)"
depends = ["lint", "typecheck", "test", "security"]

[tasks."ci:lint"]
description = "CI-only: actionlint on GitHub workflows"
run = "actionlint"

[tasks."ci:validate"]
description = "CI-only: validate all CI + pre-commit in one shot"
depends = ["lint", "typecheck", "security", "tf:validate", "ci:lint"]

# ──────────────────────────────────────────────
# Release tasks
# ──────────────────────────────────────────────

[tasks."release:bump"]
description = "Auto-bump version based on commit history, generate changelog, and tag"
run = """
set -euo pipefail
uv run cz bump --changelog --no-verify
echo "Version bumped. Run 'git push origin main --tags' to release."
"""

[tasks."release:bump-patch"]
description = "Force a patch version bump with changelog"
run = """
set -euo pipefail
uv run cz bump --increment PATCH --changelog --no-verify
echo "Patch bump complete. Run 'git push origin main --tags' to release."
"""

[tasks."release:bump-minor"]
description = "Force a minor version bump with changelog"
run = """
set -euo pipefail
uv run cz bump --increment MINOR --changelog --no-verify
echo "Minor bump complete. Run 'git push origin main --tags' to release."
"""

[tasks."release:bump-major"]
description = "Force a major version bump with changelog"
run = """
set -euo pipefail
uv run cz bump --increment MAJOR --changelog --no-verify
echo "Major bump complete. Run 'git push origin main --tags' to release."
"""

[tasks."release:changelog"]
description = "Preview changelog for unreleased changes (dry-run)"
run = "uv run cz changelog --dry-run"

# ──────────────────────────────────────────────
# Bot tasks
# ──────────────────────────────────────────────

[tasks."bot:push"]
description = "Push local changes as verified bot commits via GitHub API"
usage = "mise run bot:push -- -b <branch> -m <message> [--pr] [--pr-body <body>]"
run = "uv run scripts/bot-push.py \"$@\""
raw = true

# ──────────────────────────────────────────────
# Documentation tasks
# ──────────────────────────────────────────────

[tasks."docs:install"]
description = "Install documentation site dependencies"
run = "pnpm install --frozen-lockfile"
dir = "docs"

[tasks."docs:serve"]
description = "Serve documentation locally with hot reload"
run = "pnpm dev"
dir = "docs"

[tasks."docs:build"]
description = "Build documentation site"
run = "pnpm build"
dir = "docs"

[tasks."docs:preview"]
description = "Preview built documentation site"
run = "pnpm preview"
dir = "docs"
