# =============================================================================
# Zensical configuration — AI Gateway documentation site
# =============================================================================

[project]
site_name = "AI Gateway"
site_description = "Lightweight LLM inference gateway on AWS — Portkey OSS on ECS Fargate"
site_author = "theagenticguy"
site_url = "https://theagenticguy.github.io/ai-gateway/"
copyright = "Copyright &copy; 2025–2026 theagenticguy — Apache License 2.0"

# ── Theme ────────────────────────────────────────────────────────────────────

[project.theme]
language = "en"
features = [
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.tabs.link",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.footer",
  "navigation.breadcrumbs",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "search.highlight",
  "search.tracking",
  "toc.follow",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

# Light / dark toggle
[[project.theme.palette]]
scheme = "default"
primary = "deep purple"
accent = "amber"
toggle = { icon = "material/brightness-7", name = "Switch to dark mode" }

[[project.theme.palette]]
scheme = "slate"
primary = "deep purple"
accent = "amber"
toggle = { icon = "material/brightness-4", name = "Switch to light mode" }

# ── Navigation ───────────────────────────────────────────────────────────────

[[project.nav]]
Home = "index.md"

[[project.nav]]
"Getting Started" = [
  { "Overview" = "getting-started/index.md" },
  { "Prerequisites" = "getting-started/prerequisites.md" },
  { "Authentication" = "getting-started/authentication.md" },
]

[[project.nav]]
"User Guide" = [
  { "Overview" = "user-guide/index.md" },
  { "Agent Setup" = "user-guide/agent-setup.md" },
  { "API Reference" = "user-guide/api-reference.md" },
  { "Troubleshooting" = "user-guide/troubleshooting.md" },
]

[[project.nav]]
"Admin Guide" = [
  { "Overview" = "admin-guide/index.md" },
  { "Deployment" = "admin-guide/deployment.md" },
  { "Environments" = "admin-guide/environments.md" },
  { "Security" = "admin-guide/security.md" },
  { "Monitoring" = "admin-guide/monitoring.md" },
  { "Feature Toggles" = "admin-guide/features.md" },
]

[[project.nav]]
"Developer Guide" = [
  { "Overview" = "developer-guide/index.md" },
  { "Contributing" = "developer-guide/contributing.md" },
  { "Architecture" = "developer-guide/architecture.md" },
  { "ADR Index" = "developer-guide/adr-index.md" },
  { "CI/CD Pipeline" = "developer-guide/ci-cd.md" },
  { "Code Quality" = "developer-guide/code-quality.md" },
]

# ── Markdown extensions ──────────────────────────────────────────────────────

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions."pymdownx.superfences"]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions."pymdownx.tabbed"]
alternate_style = true

[project.markdown_extensions."pymdownx.tasklist"]
custom_checkbox = true

[project.markdown_extensions.admonition]
[project.markdown_extensions."pymdownx.details"]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions."pymdownx.emoji"]
[project.markdown_extensions."pymdownx.inlinehilite"]
[project.markdown_extensions."pymdownx.keys"]
[project.markdown_extensions."pymdownx.mark"]
[project.markdown_extensions."pymdownx.smartsymbols"]

# ── Extra ────────────────────────────────────────────────────────────────────

[project.extra]
repo_url = "https://github.com/theagenticguy/ai-gateway"
repo_name = "theagenticguy/ai-gateway"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/theagenticguy/ai-gateway"
