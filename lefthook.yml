# lefthook.yml -- Git hooks configuration
# Runs checks in parallel for speed

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true
    format:
      glob: "*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.py"
      run: uv run pyright src/
    secrets:
      run: gitleaks protect --staged --verbose
    hadolint:
      glob: "Dockerfile*"
      run: hadolint {staged_files}
    terraform-fmt:
      glob: "infrastructure/**/*.tf"
      run: terraform -chdir=infrastructure fmt -check -recursive
    terraform-validate:
      glob: "infrastructure/**/*.tf"
      run: terraform -chdir=infrastructure validate
    terraform-docs:
      glob: "infrastructure/**/*.tf"
      run: terraform-docs markdown table --output-file README.md --output-mode inject infrastructure/ && git add infrastructure/README.md
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    test:
      run: uv run pytest tests/ -x -q
    sast:
      run: uvx semgrep scan --config auto --config p/python --config p/owasp-top-ten --config p/security-audit --exclude 'infrastructure/' --quiet .
    iac:
      glob: "infrastructure/**/*.tf"
      run: uvx checkov -d infrastructure/ --framework terraform --compact --quiet
    trivy-fs:
      run: trivy fs --severity HIGH,CRITICAL --exit-code 1 --quiet .

commit-msg:
  commands:
    conventional:
      run: |
        msg=$(head -1 {1})
        if ! echo "$msg" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .{1,72}$'; then
          echo "Commit message must follow Conventional Commits: <type>(<scope>): <description>"
          echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
          exit 1
        fi
