name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for the AI Gateway? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include details if you have them.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which area does this affect?
      options:
        - Gateway (routing, providers)
        - Authentication (Cognito, JWT)
        - Infrastructure (Terraform modules)
        - Observability (monitoring, logging)
        - Security (scanning, guardrails)
        - Documentation
        - CI/CD
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or references.
