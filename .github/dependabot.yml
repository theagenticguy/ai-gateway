# ──────────────────────────────────────────────────────────────
# Dependabot — Automated dependency updates
# ──────────────────────────────────────────────────────────────
version: 2

updates:
  # ── Python (pip / pyproject.toml) ──────────────────────────
  - package-ecosystem: pip
    directory: /
    # Supply-chain cooldown (Semgrep dependabot-missing-cooldown): wait 7 days
    # before proposing a newly published version, so a compromised just-
    # published release is not opened as a PR instantly.
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    assignees:
      - theagenticguy
    reviewers:
      - theagenticguy
    commit-message:
      prefix: "deps(python):"
    labels:
      - dependencies
      - python
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch

  # ── Terraform (infrastructure/) ────────────────────────────
  - package-ecosystem: terraform
    directory: /infrastructure
    # Supply-chain cooldown (Semgrep dependabot-missing-cooldown): wait 7 days
    # before proposing a newly published version, so a compromised just-
    # published release is not opened as a PR instantly.
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    assignees:
      - theagenticguy
    reviewers:
      - theagenticguy
    commit-message:
      prefix: "deps(terraform):"
    labels:
      - dependencies
      - terraform
    groups:
      terraform-minor-patch:
        update-types:
          - minor
          - patch

  # ── GitHub Actions (.github/workflows/) ────────────────────
