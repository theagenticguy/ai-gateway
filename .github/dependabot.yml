    directory: /docs
    # Supply-chain cooldown (Semgrep dependabot-missing-cooldown): wait 7 days
    # before proposing a newly published version, so a compromised just-
    # published release is not opened as a PR instantly.
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    assignees:
      - theagenticguy
    reviewers:
      - theagenticguy
    commit-message:
      prefix: "deps(npm):"
    labels:
      - dependencies
      - javascript
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # ── Docker (container images) ──────────────────────────────
  - package-ecosystem: docker
    directory: /
    # Supply-chain cooldown (Semgrep dependabot-missing-cooldown): wait 7 days
    # before proposing a newly published version, so a compromised just-
    # published release is not opened as a PR instantly.
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    assignees:
      - theagenticguy
    reviewers:
      - theagenticguy
    commit-message:
      prefix: "deps(docker):"
    labels:
      - dependencies
      - docker
