    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    assignees:
      - theagenticguy
    reviewers:
      - theagenticguy
    commit-message:
      prefix: "deps(actions):"
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # ── npm / pnpm (docs/) ──────────────────────────────────────
