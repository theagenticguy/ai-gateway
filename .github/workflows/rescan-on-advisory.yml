# ──────────────────────────────────────────────────────────────
# Rescan — Event-driven vulnerability re-scanning
# ──────────────────────────────────────────────────────────────
# Runs nightly + on manual trigger to rescan the latest SBOM
# and container image against updated vulnerability databases.
# Catches newly disclosed CVEs in already-deployed artifacts.
# ──────────────────────────────────────────────────────────────
name: Rescan on Advisory

on:
  schedule:
    - cron: "0 6 * * *"   # Daily at 06:00 UTC
  workflow_dispatch:       # Manual trigger for immediate rescan

permissions:
  contents: read
  security-events: write
  issues: write

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: ai-gateway
  PYTHON_VERSION: "3.13"

jobs:
  rescan-sbom:
    name: SBOM Rescan (Grype + OSV-Scanner)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    outputs:
      findings: ${{ steps.check-findings.outputs.found }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download latest SBOM artifact
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          name: sbom-cyclonedx
          workflow: ci.yml
          branch: main
          search_artifacts: true
        continue-on-error: true
        id: download-sbom

      # Fallback: generate fresh SBOM if no artifact found
      - name: Load pinned versions
        if: steps.download-sbom.outcome == 'failure'
        run: grep -E '^[A-Z_][A-Z0-9_]*=' versions.env >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        if: steps.download-sbom.outcome == 'failure'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build custom gateway image (SBOM fallback)
        if: steps.download-sbom.outcome == 'failure'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          tags: ai-gateway:sbom-fallback
          build-args: |
            AGENTGATEWAY_REF=${{ env.AGENTGATEWAY_REF }}
            AGENTGATEWAY_VERSION=${{ env.AGENTGATEWAY_VERSION }}
            AGENTGATEWAY_IMAGE=ghcr.io/agentgateway/agentgateway@${{ env.AGENTGATEWAY_IMAGE_DIGEST }}

      - name: Generate SBOM fallback
        if: steps.download-sbom.outcome == 'failure'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ai-gateway:sbom-fallback
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      # ── Grype: scan SBOM against latest vuln DB ────────────
      - name: Grype SBOM scan
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: sbom.cyclonedx.json
          fail-build: "true"
          severity-cutoff: high
          output-format: sarif
        continue-on-error: true

      - name: Upload Grype SARIF
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-rescan

      # ── OSV-Scanner: check lockfiles against OSV database ──
      - name: OSV-Scanner lockfile scan
        id: osv
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --lockfile=uv.lock
            --lockfile=docs/pnpm-lock.yaml
            --format=sarif
            --output=osv-results.sarif
        continue-on-error: true

      - name: Upload OSV-Scanner SARIF
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner-rescan

      # Parse SARIF result counts rather than trusting the scanner step
      # outcomes. Grype/OSV exit non-zero both on a real finding and on a tool
      # crash; counting SARIF results distinguishes the two so a scanner error
      # no longer opens a false-positive issue. A missing SARIF is surfaced as
      # an infra warning, not a finding.
      #
      # Per-scanner logic (each preserves that scanner's configured threshold):
      #   • Grype runs with severity-cutoff: high, so only HIGH+ should trip the
      #     alert. Grype writes rejected/detail-less records (e.g. CVE-2026-6791,
      #     security-severity 0.0) into the SARIF regardless, so we filter on
      #     GitHub's security-severity (>= 7.0 == HIGH), the HIGH/CRITICAL tags,
      #     or an error-level result — a naive result count would false-positive.
      #   • OSV has no cutoff configured and alerts on any lockfile vulnerability
      #     by design, so we count all of its results.
      - name: Check for findings
        id: check-findings
        if: always()
        env:
          GRYPE_SARIF: ${{ steps.grype.outputs.sarif }}
        run: |
          count=0
          # Grype — HIGH+ only (matches severity-cutoff: high)
          if [[ -n "$GRYPE_SARIF" && -f "$GRYPE_SARIF" ]]; then
            g=$(jq '[ .runs[]?
              | ( [ .tool.driver.rules[]? | {key:.id, value:.} ] | from_entries ) as $rmap
              | .results[]?
              | .ruleId as $rid
              | ($rmap[$rid].properties["security-severity"] // "0") as $ssev
              | ($rmap[$rid].properties.tags // []) as $tags
              | select( (($ssev | tonumber? // 0) >= 7.0)
                        or ($tags | index("HIGH")) or ($tags | index("CRITICAL"))
                        or (.level == "error") )
            ] | length' "$GRYPE_SARIF")
            echo "Grype HIGH+ results: ${g}"
            count=$((count + g))
          else
            echo "::warning::Grype SARIF missing (scanner error, not a vulnerability finding)"
          fi
          # OSV — any lockfile vulnerability (no cutoff configured)
          if [[ -f osv-results.sarif ]]; then
            o=$(jq '[.runs[]?.results[]?] | length' osv-results.sarif)
            echo "OSV results: ${o}"
            count=$((count + o))
          else
            echo "::warning::OSV SARIF missing (scanner error, not a vulnerability finding)"
          fi
          echo "Total SBOM finding count: ${count}"
          if [[ "${count}" -gt 0 ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

  rescan-image:
    name: Container Image Rescan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    outputs:
      findings: ${{ steps.check-findings.outputs.found }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Load pinned versions
        run: grep -E '^[A-Z_][A-Z0-9_]*=' versions.env >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build custom gateway image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          tags: ai-gateway:rescan
          build-args: |
            AGENTGATEWAY_REF=${{ env.AGENTGATEWAY_REF }}
            AGENTGATEWAY_VERSION=${{ env.AGENTGATEWAY_VERSION }}
            AGENTGATEWAY_IMAGE=ghcr.io/agentgateway/agentgateway@${{ env.AGENTGATEWAY_IMAGE_DIGEST }}

      - name: Trivy rescan
        id: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        continue-on-error: true   # a scanner crash must not be read as a finding; check-findings parses the SARIF result count instead
        with:
          image-ref: ai-gateway:rescan
          format: sarif
          output: trivy-rescan-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-rescan-results.sarif
          category: trivy-rescan

      # Count HIGH/CRITICAL results in the SARIF rather than trusting
      # steps.trivy.outcome. Trivy exits non-zero both when it finds a
      # HIGH/CRITICAL *and* when it crashes on a rejected/detail-less CVE record
      # (e.g. CVE-2026-6791 in the Wolfi feed). The old logic conflated the two
      # and opened a false-positive issue on every crash. Trivy also writes the
      # crashing UNKNOWN record into the SARIF despite `severity: CRITICAL,HIGH`,
      # so a naive result count is not enough — we filter on GitHub's
      # security-severity (>= 7.0 == HIGH), the HIGH/CRITICAL SARIF tags, or an
      # error-level result.
      - name: Check for findings
        id: check-findings
        if: always()
        run: |
          if [[ ! -f trivy-rescan-results.sarif ]]; then
            # No SARIF written at all — surface it as an infra warning, not a
            # vulnerability finding, so a genuinely broken scan is not silently green.
            echo "::warning::Trivy produced no SARIF output (scanner error, not a vulnerability finding)"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          count=$(jq '[ .runs[]?
            | ( [ .tool.driver.rules[]? | {key:.id, value:.} ] | from_entries ) as $rmap
            | .results[]?
            | .ruleId as $rid
            | ($rmap[$rid].properties["security-severity"] // "0") as $ssev
            | ($rmap[$rid].properties.tags // []) as $tags
            | select( (($ssev | tonumber? // 0) >= 7.0)
                      or ($tags | index("HIGH")) or ($tags | index("CRITICAL"))
                      or (.level == "error") )
          ] | length' trivy-rescan-results.sarif)
          echo "Trivy HIGH+ SARIF result count: ${count}"
          if [[ "${count}" -gt 0 ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Alert on findings ────────────────────────────────────────
  alert:
    name: Open Issue on Findings
    needs: [rescan-sbom, rescan-image]
    if: always() && (needs.rescan-sbom.outputs.findings == 'true' || needs.rescan-image.outputs.findings == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "automated" --description "Automatically generated by CI/CD" --color "0e8a16" --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create "security" --description "Security-related issues" --color "b60205" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Check for existing open issue
        id: check-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "security,automated" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')
          echo "existing=$existing" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Issue for new vulnerabilities
        if: steps.check-issue.outputs.existing == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Nightly rescan: new HIGH+ vulnerabilities found ($(date -u +%Y-%m-%d))" \
            --label "security,automated" \
            --body "$(cat <<'BODY'
          ## Nightly Vulnerability Rescan Alert

          The scheduled rescan workflow detected new HIGH or CRITICAL vulnerabilities
          in already-deployed artifacts.

          **SBOM Rescan findings:** ${{ needs.rescan-sbom.outputs.findings }}
          **Image Rescan findings:** ${{ needs.rescan-image.outputs.findings }}

          ### Next Steps
          1. Review findings in the [Security tab](/${{ github.repository }}/security/code-scanning)
          2. Triage and remediate HIGH+ findings
          3. Run `mise run security` locally to reproduce

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BODY
          )"

      - name: Comment on existing issue
        if: steps.check-issue.outputs.existing != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.check-issue.outputs.existing }}" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<BODY
          **Rescan update ($(date -u +%Y-%m-%d)):** vulnerabilities still present.

          **SBOM Rescan findings:** ${{ needs.rescan-sbom.outputs.findings }}
          **Image Rescan findings:** ${{ needs.rescan-image.outputs.findings }}

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BODY
          )"
