# ──────────────────────────────────────────────────────────────
# Release — Tag-driven release automation
# ──────────────────────────────────────────────────────────────
# Triggered by pushing a tag matching `v*` (e.g. v1.2.0).
# Builds the container image, pushes to GHCR (always) and ECR
# (when AWS credentials are configured), signs it, generates an
# SBOM, and creates a GitHub Release with an auto-generated
# changelog.
# ──────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: ai-gateway

jobs:
  release:
    name: Build, Sign & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Create releases, upload assets
      id-token: write          # OIDC for AWS + cosign keyless signing
      packages: write          # Push container images to GHCR
      attestations: write      # SLSA build provenance attestations
      security-events: write   # Upload SARIF
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0   # Full history for changelog generation

      - name: Load pinned versions
        run: cat versions.env >> "$GITHUB_ENV"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Check ECR availability
        id: ecr-check
        run: |
          if [[ -n "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AWS_DEPLOY_ROLE_ARN not configured — skipping ECR push"
          fi

      # ── AWS + ECR (optional — for self-hosted deployments) ──
      - name: Configure AWS credentials
        if: steps.ecr-check.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.ecr-check.outputs.enabled == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2

      # ── GHCR (always) ───────────────────────────────────────
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & Push ─────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Compute image tags
        id: tags
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          TAGS="ghcr.io/${{ github.repository }}:${VERSION}"
          TAGS="${TAGS},ghcr.io/${{ github.repository }}:latest"

          if [[ "${{ steps.ecr-check.outputs.enabled }}" == "true" ]]; then
            ECR="${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}"
            TAGS="${TAGS},${ECR}:${VERSION},${ECR}:${{ github.sha }},${ECR}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PORTKEY_VERSION=${{ env.PORTKEY_VERSION }}
            PORTKEY_TARBALL_SHA256=${{ env.PORTKEY_TARBALL_SHA256 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract image metadata
        id: meta
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          echo "digest=${{ steps.push.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "ghcr-uri=ghcr.io/${{ github.repository }}:${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ "${{ steps.ecr-check.outputs.enabled }}" == "true" ]]; then
            echo "ecr-uri=${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      # ── Cosign ───────────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4

      - name: Sign images with cosign (keyless)
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository }}:${VERSION}"

          if [[ -n "${{ steps.meta.outputs.ecr-uri }}" ]]; then
            cosign sign --yes "${{ steps.meta.outputs.ecr-uri }}"
          fi

      # ── SBOM ─────────────────────────────────────────────────
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ steps.meta.outputs.ghcr-uri }}
          format: cyclonedx-json
          output-file: sbom-${{ steps.version.outputs.tag }}.cyclonedx.json

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ steps.meta.outputs.ghcr-uri }}
          format: spdx-json
          output-file: sbom-${{ steps.version.outputs.tag }}.spdx.json

      # ── Changelog & GitHub Release ───────────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag for changelog range
          PREV_TAG=$(git tag --sort=-creatordate | grep -E '^v' | sed -n '2p')

          if [ -z "${PREV_TAG}" ]; then
            echo "body=Initial release." >> "$GITHUB_OUTPUT"
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" \
              --pretty=format:"- %s (%h)" \
              --no-merges)
            # Use a delimiter for multiline output
            {
              echo "body<<CHANGELOG_EOF"
              echo "## Changes since ${PREV_TAG}"
              echo ""
              echo "${CHANGELOG}"
              echo ""
              echo "## Container Image"
              echo ""
              echo '```'
              echo "ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}"
              echo "Digest: ${{ steps.meta.outputs.digest }}"
              echo '```'
              echo ""
              echo "## Verification"
              echo ""
              echo '```bash'
              echo "cosign verify ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}"
              echo '```'
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-rc') || contains(steps.version.outputs.tag, '-beta') || contains(steps.version.outputs.tag, '-alpha') }}
          files: |
            sbom-${{ steps.version.outputs.tag }}.cyclonedx.json
            sbom-${{ steps.version.outputs.tag }}.spdx.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── SLSA Provenance ─────────────────────────────────────
      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.meta.outputs.digest }}
          push-to-registry: false
