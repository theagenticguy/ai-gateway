# ──────────────────────────────────────────────────────────────
# Data-plane image scanner — DISABLED PENDING REWRITE (ADR-017)
# ──────────────────────────────────────────────────────────────
# This workflow tracked the Portkey OSS *source* pin (PORTKEY_REF). With the
# data-plane swap to agentgateway (ADR-017), there is no Portkey source to
# track: the data plane is the pinned upstream agentgateway image
# (AGENTGATEWAY_REF + AGENTGATEWAY_IMAGE_DIGEST in versions.env).
#
# The daily schedule is removed so this stale Portkey-specific logic stops
# running. The replacement is a TODO (tracked in ADR-017 migration follow-ups):
# a watcher that polls github.com/agentgateway/agentgateway releases, resolves
# the new image digest, and opens a PR bumping AGENTGATEWAY_REF +
# AGENTGATEWAY_IMAGE_DIGEST. Until then, image CVE coverage is provided by the
# nightly image scans (Trivy/Grype in ci.yml + rescan-on-advisory.yml + Amazon
# Inspector on the ECR image), which scan the running image regardless of pin
# provenance.
name: Data-plane Image Scanner (disabled, see ADR-017)

on:
  workflow_dispatch: {} # manual only; daily schedule removed pending rewrite

permissions:
  contents: read

jobs:
  notice:
    name: Replacement pending (ADR-017)
    runs-on: ubuntu-latest
    steps:
      - name: Explain
        run: |
          echo "The Portkey release scanner is retired with the agentgateway"
          echo "data-plane swap (ADR-017). Rewrite this as an agentgateway image"
          echo "version/digest watcher. Image CVE scanning continues via the"
          echo "nightly Trivy/Grype/Inspector image scans."
