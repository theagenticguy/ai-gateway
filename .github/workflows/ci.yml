# ──────────────────────────────────────────────────────────────
# CI/CD Pipeline — ai-gateway
# ──────────────────────────────────────────────────────────────
# Runs on every push/PR to main. Jobs are parallelised where
# possible; build-and-push + deploy gate on all quality/security
# jobs passing first.
# ──────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: ai-gateway
  PYTHON_VERSION: "3.13"

# ── Default permissions (least-privilege) ────────────────────
permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. Code Quality
  # ────────────────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run --frozen ruff check --output-format=github .

      - name: Ruff format check
        run: uv run --frozen ruff format --check .

      - name: Pyright type check
        run: uv run --frozen pyright src/

      - name: Run tests with coverage
        run: uv run --frozen pytest tests/ -v --tb=short
        if: hashFiles('tests/**/*.py') != ''

      - name: Upload coverage to Codecov
        if: hashFiles('tests/**/*.py') != '' && always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────
  # 2. SAST — Static Application Security Testing
  # ────────────────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    container:
      image: semgrep/semgrep:1.76.0@sha256:1cbeb7b17cdcf5527b0638b5a9042d0ac06432b517416508534266ae8979b670
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Semgrep SAST scan
        run: |
          semgrep scan \
            --config auto \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --exclude 'infrastructure/' \
            --sarif \
            --output semgrep.sarif \
            --error
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv sync --frozen

      - name: Bandit scan
        run: uv run --frozen bandit -r src/ -f sarif -o bandit.sarif --exit-zero

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        continue-on-error: true
        with:
          sarif_file: bandit.sarif
          category: bandit

  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Gitleaks secret detection
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SARIF: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: results.sarif
          category: gitleaks
        continue-on-error: true

  # ────────────────────────────────────────────────────────────
  # 2b. Dependency Audit — pip-audit + OSV-Scanner
  # ────────────────────────────────────────────────────────────
  security-deps:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Export locked dependencies
        run: uv export --no-dev --no-hashes > requirements.txt

      - name: Audit Python dependencies
        run: uvx pip-audit -r requirements.txt --strict --desc

      - name: OSV-Scanner lockfile scan
        id: osv
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --format=sarif
            --output=results.sarif
            --lockfile=uv.lock
            --lockfile=docs/pnpm-lock.yaml

      - name: Upload OSV-Scanner SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: results.sarif
          category: osv-scanner
        continue-on-error: true

  # ────────────────────────────────────────────────────────────
  # 2c. Filesystem Security — Trivy repo scan
  # ────────────────────────────────────────────────────────────
  security-fs:
    name: Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        continue-on-error: true
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ────────────────────────────────────────────────────────────
  # 2d. License Compliance — pip-licenses
  # ────────────────────────────────────────────────────────────
  licenses:
    name: License Compliance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv sync --frozen

      - name: License check
        run: uv run --frozen --with pip-licenses==4.4.0 pip-licenses

      - name: Generate reports
        run: |
          uv run --frozen --with pip-licenses==4.4.0 pip-licenses --format=json --output-file=license-report.json
          uv run --frozen --with pip-licenses==4.4.0 pip-licenses --format=markdown --output-file=license-report.md

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: license-reports
          path: |
            license-report.json
            license-report.md
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # 3. IaC Security — Terraform / Infrastructure
  # ────────────────────────────────────────────────────────────
  security-iac:
    name: IaC Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "1.14.8"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive -diff infrastructure/

      - name: Terraform init (no backend)
        working-directory: infrastructure
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infrastructure
        run: terraform validate

      - name: Install terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz https://terraform-docs.io/dl/v0.21.0/terraform-docs-v0.21.0-linux-amd64.tar.gz
          echo "2fdd81b8d21ff1498cd559af0dcc5d155835f84600db06d3923e217124fc735a  terraform-docs.tar.gz" | sha256sum -c -
          tar -xzf terraform-docs.tar.gz
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/

      - name: Check terraform-docs is up to date
        id: tf-docs
        run: |
          terraform-docs markdown table --output-file README.md --output-mode inject infrastructure/
          git diff --exit-code infrastructure/README.md || (echo "::error::terraform-docs is out of date. Run 'mise run tf:docs'" && exit 1)
        continue-on-error: true

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6
        with:
          tflint_version: "v0.61.0"

      - name: Init TFLint
        run: tflint --init
        working-directory: infrastructure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint --recursive --format compact
        working-directory: infrastructure

      - name: Checkov IaC scan
        if: always()
        uses: bridgecrewio/checkov-action@4a1afa9897f7afe297a3762c926e1e800361464f # v12
        with:
          directory: infrastructure/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
          skip_check: CKV_TF_1,CKV2_AWS_50,CKV_AWS_115,CKV_AWS_116,CKV_AWS_117,CKV_AWS_272,CKV2_AWS_53,CKV2_AWS_51,CKV2_AWS_62,CKV_AWS_144,CKV_AWS_145,CKV_AWS_18,CKV_AWS_21,CKV2_AWS_29,CKV2_AWS_77,CKV2_AWS_4,CKV_AWS_276,CKV_AWS_225,CKV_AWS_308,CKV2_AWS_75,CKV2_AWS_57,CKV2_AWS_6,CKV_AWS_19,CKV_AWS_20,CKV_AWS_57,CKV2_AWS_31,CKV2_AWS_40,CKV2_AWS_56
          download_external_modules: false

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      - name: Fail if terraform-docs is stale
        if: steps.tf-docs.outcome == 'failure'
        run: |
          echo "::error::terraform-docs is out of date. Run 'mise run tf:docs'"
          exit 1

  # ────────────────────────────────────────────────────────────
  # 4. Container Security — Build, scan, Dockerfile lint, SBOM
  # ────────────────────────────────────────────────────────────
  security-container:
    name: Container Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Load pinned versions
        run: grep -E '^[A-Z_][A-Z0-9_]*=' versions.env >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build custom gateway image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci
          build-args: |
            AGENTGATEWAY_REF=${{ env.AGENTGATEWAY_REF }}
            AGENTGATEWAY_VERSION=${{ env.AGENTGATEWAY_VERSION }}
            AGENTGATEWAY_IMAGE=ghcr.io/agentgateway/agentgateway@${{ env.AGENTGATEWAY_IMAGE_DIGEST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Hadolint Dockerfile lint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          recursive: true
          format: sarif
          output-file: hadolint-results.sarif

      - name: Upload Hadolint SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: hadolint-results.sarif
          category: hadolint

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE_NAME }}:ci
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90

