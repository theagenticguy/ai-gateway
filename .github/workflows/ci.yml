# ──────────────────────────────────────────────────────────────
# CI/CD Pipeline — ai-gateway
# ──────────────────────────────────────────────────────────────
# Runs on every push/PR to main. Jobs are parallelised where
# possible; build-and-push + deploy gate on all quality/security
# jobs passing first.
# ──────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: ai-gateway
  PORTKEY_VERSION: "1.15.2"
  PYTHON_VERSION: "3.13"

# ── Default permissions (least-privilege) ────────────────────
permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. Code Quality
  # ────────────────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type check
        run: uv run pyright src/

  # ────────────────────────────────────────────────────────────
  # 2. SAST — Static Application Security Testing
  # ────────────────────────────────────────────────────────────
  security-sast:
    name: SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/security-audit
          auditOn: push
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Gitleaks secret detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE_KEY }}

  # ────────────────────────────────────────────────────────────
  # 3. IaC Security — Terraform / Infrastructure
  # ────────────────────────────────────────────────────────────
  security-iac:
    name: IaC Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.5"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive -diff infrastructure/

      - name: Terraform init (no backend)
        working-directory: infrastructure
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infrastructure
        run: terraform validate

      - name: Install terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz https://terraform-docs.io/dl/v0.19.0/terraform-docs-v0.19.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/

      - name: Check terraform-docs is up to date
        run: |
          terraform-docs markdown table --output-file README.md --output-mode inject infrastructure/
          git diff --exit-code infrastructure/README.md || (echo "terraform-docs is out of date. Run 'mise run tf:docs'" && exit 1)

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init
        working-directory: infrastructure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint --recursive --format compact
        working-directory: infrastructure

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
          skip_check: CKV_TF_1,CKV2_AWS_50
          download_external_modules: false

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # ────────────────────────────────────────────────────────────
  # 4. Container Security — Image scan, Dockerfile lint, SBOM
  # ────────────────────────────────────────────────────────────
  security-container:
    name: Container Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Pull Portkey gateway image
        run: docker pull portkeyai/gateway:${{ env.PORTKEY_VERSION }}

      - name: Hadolint Dockerfile lint
        uses: hadolint/hadolint-action@v3.3.0
        if: hashFiles('**/Dockerfile') != ''
        with:
          recursive: true
          format: sarif
          output-file: hadolint-results.sarif

      - name: Upload Hadolint SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('**/Dockerfile') != '' && always()
        with:
          sarif_file: hadolint-results.sarif
          category: hadolint

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: portkeyai/gateway:${{ env.PORTKEY_VERSION }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: portkeyai/gateway:${{ env.PORTKEY_VERSION }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90

