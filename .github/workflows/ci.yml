# ──────────────────────────────────────────────────────────────
# CI/CD Pipeline — ai-gateway
# ──────────────────────────────────────────────────────────────
# Runs on every push/PR to main. Jobs are parallelised where
# possible; build-and-push + deploy gate on all quality/security
# jobs passing first.
# ──────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: ai-gateway
  PYTHON_VERSION: "3.13"

# ── Default permissions (least-privilege) ────────────────────
permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. Code Quality
  # ────────────────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type check
        run: uv run pyright src/

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --tb=short
        if: hashFiles('tests/**/*.py') != ''

      - name: Upload coverage to Codecov
        if: hashFiles('tests/**/*.py') != '' && always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────
  # 2. SAST — Static Application Security Testing
  # ────────────────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    container:
      image: semgrep/semgrep:1.76.0@sha256:1cbeb7b17cdcf5527b0638b5a9042d0ac06432b517416508534266ae8979b670
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Semgrep SAST scan
        run: |
          semgrep scan \
            --config auto \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --exclude 'infrastructure/' \
            --sarif \
            --output semgrep.sarif \
            --error
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install dependencies
        run: uv sync --frozen

      - name: Bandit scan
        run: uvx --with 'bandit[sarif]' bandit -r src/ -f sarif -o bandit.sarif --exit-zero

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: bandit.sarif
          category: bandit

  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Gitleaks secret detection
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SARIF: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: results.sarif
          category: gitleaks
        continue-on-error: true

  # ────────────────────────────────────────────────────────────
  # 2b. Dependency Audit — pip-audit + OSV-Scanner
  # ────────────────────────────────────────────────────────────
  security-deps:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Export locked dependencies
        run: uv export --no-dev --no-hashes > requirements.txt

      - name: Audit Python dependencies
        run: uvx pip-audit -r requirements.txt --strict --desc

      - name: OSV-Scanner lockfile scan
        id: osv
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        continue-on-error: true
        with:
          scan-args: |-
            --format=sarif
            --output=results.sarif
            --lockfile=uv.lock
            --lockfile=docs/pnpm-lock.yaml

      - name: Upload OSV-Scanner SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: results.sarif
          category: osv-scanner
        continue-on-error: true

  # ────────────────────────────────────────────────────────────
  # 2c. Filesystem Security — Trivy repo scan
  # ────────────────────────────────────────────────────────────
  security-fs:
    name: Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ────────────────────────────────────────────────────────────
  # 2d. License Compliance — pip-licenses
  # ────────────────────────────────────────────────────────────
  licenses:
    name: License Compliance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install dependencies
        run: uv sync --frozen

      - name: License check
        run: uv run --with pip-licenses pip-licenses

      - name: Generate reports
        run: |
          uv run --with pip-licenses pip-licenses --format=json --output-file=license-report.json
          uv run --with pip-licenses pip-licenses --format=markdown --output-file=license-report.md

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: license-reports
          path: |
            license-report.json
            license-report.md
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # 3. IaC Security — Terraform / Infrastructure
  # ────────────────────────────────────────────────────────────
  security-iac:
    name: IaC Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "1.14.8"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive -diff infrastructure/

      - name: Terraform init (no backend)
        working-directory: infrastructure
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infrastructure
        run: terraform validate

      - name: Install terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz https://terraform-docs.io/dl/v0.21.0/terraform-docs-v0.21.0-linux-amd64.tar.gz
          echo "2fdd81b8d21ff1498cd559af0dcc5d155835f84600db06d3923e217124fc735a  terraform-docs.tar.gz" | sha256sum -c -
          tar -xzf terraform-docs.tar.gz
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/

      - name: Check terraform-docs is up to date
        run: |
          terraform-docs markdown table --output-file README.md --output-mode inject infrastructure/
          git diff --exit-code infrastructure/README.md || (echo "terraform-docs is out of date. Run 'mise run tf:docs'" && exit 1)

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6
        with:
          tflint_version: "v0.61.0"

      - name: Init TFLint
        run: tflint --init
        working-directory: infrastructure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint --recursive --format compact
        working-directory: infrastructure

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@0ce65fae06c148e349f955c3c35ad049c11e838c # v12
        with:
          directory: infrastructure/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
          skip_check: CKV_TF_1,CKV2_AWS_50,CKV_AWS_115,CKV_AWS_116,CKV_AWS_117,CKV_AWS_272,CKV2_AWS_53,CKV2_AWS_51,CKV2_AWS_62,CKV_AWS_144,CKV_AWS_145,CKV_AWS_18,CKV_AWS_21
          download_external_modules: false

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # ────────────────────────────────────────────────────────────
  # 4. Container Security — Image scan, Dockerfile lint, SBOM
  # ────────────────────────────────────────────────────────────
  security-container:
    name: Container Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Load pinned versions
        run: cat versions.env >> "$GITHUB_ENV"

      - name: Pull Portkey gateway image
        run: docker pull portkeyai/gateway@${{ env.PORTKEY_DIGEST }}

      - name: Hadolint Dockerfile lint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        if: hashFiles('**/Dockerfile') != ''
        with:
          recursive: true
          format: sarif
          output-file: hadolint-results.sarif

      - name: Upload Hadolint SARIF
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: hashFiles('**/Dockerfile') != '' && always()
        with:
          sarif_file: hadolint-results.sarif
          category: hadolint

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: portkeyai/gateway@${{ env.PORTKEY_DIGEST }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: portkeyai/gateway@${{ env.PORTKEY_DIGEST }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90

