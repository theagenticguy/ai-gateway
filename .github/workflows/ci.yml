name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: ai-gateway
  PORTKEY_VERSION: "1.15.2"

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  lint:
    name: Lint & IaC Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run ruff linter
        run: uv run ruff check .

      - name: Check ruff formatting
        run: uv run ruff format --check .

      - name: Run hadolint on Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        if: hashFiles('**/Dockerfile') != ''
        with:
          recursive: true

      - name: Run checkov on infrastructure
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/
          framework: terraform
          soft_fail: false

  scan-and-push:
    name: Scan & Push Image
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull Portkey gateway image
        run: docker pull portkeyai/gateway:${{ env.PORTKEY_VERSION }}

      - name: Tag image for ECR
        run: |
          docker tag portkeyai/gateway:${{ env.PORTKEY_VERSION }} \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: portkeyai/gateway:${{ env.PORTKEY_VERSION }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: ${{ github.ref == 'refs/heads/main' && '1' || '0' }}

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: portkeyai/gateway:${{ env.PORTKEY_VERSION }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json

      - name: Push image to ECR
        if: github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag portkeyai/gateway:${{ env.PORTKEY_VERSION }} \
            $ECR_REGISTRY/${{ env.IMAGE_NAME }}:latest
          docker push $ECR_REGISTRY/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push $ECR_REGISTRY/${{ env.IMAGE_NAME }}:latest

      - name: Install cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        if: github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: cosign sign --yes $ECR_REGISTRY/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: scan-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ai-gateway \
            --service ai-gateway \
            --force-new-deployment

      - name: Wait for deployment stability
        run: |
          aws ecs wait services-stable \
            --cluster ai-gateway \
            --services ai-gateway
        timeout-minutes: 10
