# ──────────────────────────────────────────────────────────────
# CodeQL — GitHub's semantic code analysis
# ──────────────────────────────────────────────────────────────
# Runs on push/PR to main and on a weekly schedule so that
# results stay fresh even during quiet periods.
# ──────────────────────────────────────────────────────────────
name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every Monday at 06:15 UTC
    - cron: "15 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@42c37fa6c31182c76b77826182275d3fc53b2dab # v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@42c37fa6c31182c76b77826182275d3fc53b2dab # v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@42c37fa6c31182c76b77826182275d3fc53b2dab # v4
        with:
          category: /language:${{ matrix.language }}
          upload: always
