# ──────────────────────────────────────────────────────────────
# Dependency Review — PR-time vulnerability & license check
# ──────────────────────────────────────────────────────────────
# Scans dependency changes in a PR for known vulnerabilities
# and problematic licenses before they land on main.
# ──────────────────────────────────────────────────────────────
name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          # Fail the check on high and critical vulnerabilities
          fail-on-severity: high
          # Deny copyleft licenses that conflict with proprietary use
          deny-licenses: GPL-3.0, GPL-3.0-only, GPL-3.0-or-later, AGPL-3.0, AGPL-3.0-only, AGPL-3.0-or-later
          # Comment a summary on the PR
          comment-summary-in-pr: always
          warn-only: false
