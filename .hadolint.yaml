# .hadolint.yaml -- Hadolint configuration
ignored:
  - DL3008  # Pin versions in apt-get install (handled by base image choice)
  - DL3018  # Pin versions in apk add — we run apk upgrade first; pinning defeats patching
  - DL4006  # pipefail not available in Alpine ash; using set -eu + && chains instead
trustedRegistries:
  - docker.io
  - public.ecr.aws
  - cgr.dev
  - gcr.io/distroless
