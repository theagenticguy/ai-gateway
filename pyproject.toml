[project]
name = "ai-gateway"
version = "0.1.0"
description = "Lightweight LLM API Gateway — Portkey OSS on ECS Fargate"
requires-python = ">=3.13"
dependencies = [
    "boto3>=1.42.72",
    "email-validator>=2.0",
    "pydantic>=2.12.5",
]

[dependency-groups]
dev = [
    "pytest>=9.0",
    "ruff>=0.15",
    "pyright>=1.1.408",
    "boto3-stubs>=1.42.72",
    "hypothesis>=6.151.9",
    "atheris>=3.0.0",
    "pytest-cov>=7.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "--cov=cost_attribution --cov=pre_token --cov=budget_enforcement --cov=content_scanner --cov=budget_admin --cov=chargeback_report --cov=routing_config --cov=team_registration --cov-branch --cov-report=term --cov-report=xml"

[tool.coverage.run]
source = ["src"]
branch = true
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
fail_under = 0
