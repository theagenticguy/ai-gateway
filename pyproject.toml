[project]
name = "ai-gateway"
version = "0.1.0"
description = "Lightweight LLM API Gateway — Portkey OSS on ECS Fargate"
requires-python = ">=3.13"
dependencies = [
    "boto3>=1.42.72",
    "pydantic>=2.12.5",
]

[dependency-groups]
dev = [
    "pytest>=9.0",
    "ruff>=0.15",
    "pyright>=1.1.408",
    "zensical>=0.0.28",
    "boto3-stubs>=1.42.72",
    "hypothesis>=6.151.9",
    "atheris>=3.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
