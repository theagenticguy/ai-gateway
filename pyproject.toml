requires-python = ">=3.13"
dependencies = [
    "boto3>=1.42.72",
]

[dependency-groups]
dev = [
    "pytest>=9.0",
    "ruff>=0.15",
    "pyright>=1.1.408",
    "zensical>=0.0.28",
    "boto3-stubs>=1.42.72",
]
