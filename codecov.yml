coverage:
  status:
    project:
      default:
        target: 85%
        threshold: 5%
        if_ci_failed: error
        informational: true
    patch:
      default:
        target: 70%
        threshold: 10%
        informational: true

  # Only track Python source code
  paths:
    - src/

ignore:
  - tests/
  - infrastructure/
  - scripts/
  - docs/

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  behavior: default
  require_changes: true

github_checks:
  annotations: true
