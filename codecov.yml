coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 5%

  # Only track Python source code
  paths:
    - src/

ignore:
  - tests/
  - infrastructure/
  - scripts/
  - docs/

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  behavior: default
  require_changes: true

github_checks:
  annotations: true
